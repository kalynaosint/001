<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 内容协调投票系统</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<!-- 顶部Tab导航 (OASIS sliding doors 结构) -->
<div class="top-nav-wrapper">
    <ul class="top-nav">
        <li class="active">
            <span class="tab-left"><span class="tab-right"><a class="tab-center" href="#">登录</a></span></span>
        </li>
    </ul>
</div>

<!-- 子导航 -->
<div class="tabsection">
    <div class="tabsection-top">
        <div class="toptabs-subtabs">
            <a href="#" class="toptabs-subtab selected">成员登录</a>
        </div>
    </div>
    <div class="tabsection-bottom-row">
        <div class="tabsection-left"></div>
        <div class="tabsection-center"></div>
        <div class="tabsection-right"></div>
    </div>
</div>

<!-- 登录卡片 -->
<div class="login-wrapper">
    <div class="login-header">
        <span class="icon">🔐</span>成员登录
    </div>
    <div class="login-body">
        <h1 class="login-title">内容协调投票系统</h1>
        <div class="login-subtitle">- 组内 Bilibili / 抖音 / 知乎 内容发布协调</div>

        <div id="errorMsg" class="login-error" style="display: none;"></div>

        <form id="loginForm" autocomplete="off">
            <div class="form-row">
                <label for="memberSelect">选择成员：</label>
                <select id="memberSelect" required>
                    <option value="">-- 请选择 --</option>
                </select>
            </div>
            <div class="form-row">
                <label for="passwordInput">密码：</label>
                <input type="password" id="passwordInput" required>
            </div>
            <div class="login-actions">
                <button type="submit" class="btn btn-primary">
                    <span class="btn-icon">▶</span>登录
                </button>
                <button type="button" id="guestLoginBtn" class="btn">
                    <span class="btn-icon">👁</span>游客查看
                </button>
            </div>

        </form>

        <div class="login-hint">
            提示：成员名单与密码由管理员在 <code>config.js</code> 中维护。<br>
            若遗忘密码请联系管理员。<br>
            <strong>游客模式</strong>：只能查看投票进度和历史，无法参与投票或发起请求。
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
    // 填充成员下拉框
    const select = document.getElementById("memberSelect");
    MEMBERS.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        const roleLabel = m.role === "leader"            ? " (组长)"
            : m.role === "operator_bilibili" ? " (Bilibili运营)"
            : m.role === "operator_douyin"   ? " (抖音运营)"
            : m.role === "operator_zhihu"    ? " (知乎运营)"
            : "";
        opt.textContent = m.name + roleLabel;
        select.appendChild(opt);
    });

    // 已登录则跳转
    if (loadSession()) {
        window.location.href = "app.html";
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const id = select.value;
        const pwd = document.getElementById("passwordInput").value;
        const member = getMemberById(id);
        const errBox = document.getElementById("errorMsg");

        if (!member) {
            errBox.textContent = "请选择有效的成员";
            errBox.style.display = "block";
            return;
        }
        if (member.password !== pwd) {
            errBox.textContent = "密码错误";
            errBox.style.display = "block";
            return;
        }
        // 登录成功
        saveSession({ id: member.id, name: member.name, role: member.role });
        window.location.href = "app.html";
    });

    // 游客登录
    document.getElementById("guestLoginBtn").addEventListener("click", function() {
        saveSession({ id: "guest", name: "游客", role: "guest" });
        window.location.href = "app.html";
    });
</script>

</body>
</html>
